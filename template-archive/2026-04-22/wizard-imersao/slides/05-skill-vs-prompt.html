<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Creator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  :root {
    --bg: #0A0E2A;
    --accent: #FE5000; --accent2: #ff7a35;
    --green: #22c55e; --red: #ef4444;
    --text: #e2e8f0; --text2: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: var(--bg); font-family: 'Inter', system-ui, sans-serif; color: var(--text); overflow: hidden; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 80px; gap: 56px; }

  h1 {
    font-size: clamp(36px, 5vw, 60px); font-weight: 900; text-align: center;
    background: linear-gradient(135deg, #fff 30%, var(--accent2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; line-height: 1.1;
  }

  .vs {
    display: flex; align-items: stretch; gap: 40px;
    width: 100%; max-width: 900px;
  }
  .vs-card {
    flex: 1; border-radius: 20px; padding: 36px 40px;
    position: relative; overflow: hidden;
  }
  .vs-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
  .card-bad { background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.2); }
  .card-bad::before { background: var(--red); }
  .card-good { background: rgba(34,197,94,0.05); border: 1px solid rgba(34,197,94,0.2); }
  .card-good::before { background: var(--green); }
  .vs-label { font-size: 12px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 10px; }
  .label-red { color: var(--red); }
  .label-green { color: var(--green); }
  .vs-title { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
  .vs-desc { font-size: 17px; color: var(--text2); line-height: 1.7; }

  .vs-arrow { font-size: 36px; color: var(--accent2); flex-shrink: 0; display: flex; align-items: center; }

  .tagline {
    text-align: center; font-size: 20px; color: var(--text2); font-weight: 500;
  }
  .tagline strong { color: var(--accent2); font-weight: 700; }
</style>
</head>
<body>

  <h1>Prompt vs Skill</h1>

  <div class="vs">
    <div class="vs-card card-bad">
      <div class="vs-label label-red">Prompt</div>
      <div class="vs-title">Temporário</div>
      <div class="vs-desc">Morre quando a sessão fecha.<br>Vive na cabeça de alguém.<br>Explica tudo de novo toda vez.</div>
    </div>
    <div class="vs-arrow">→</div>
    <div class="vs-card card-good">
      <div class="vs-label label-green">Skill</div>
      <div class="vs-title">Permanente</div>
      <div class="vs-desc">Salva no Cérebro.<br>Qualquer agente acessa.<br>Melhora a cada uso.</div>
    </div>
  </div>

  <p class="tagline">O <strong>skill-creator</strong> transforma qualquer processo em skill — com QA automático.</p>

</body>
</html>
